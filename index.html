<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utrera Sacra: Itinerarios 2026</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v8.2.0/ol.css">
    <style>
        :root {
            --primary-color: #5c2040;
            --bg-panel: rgba(20, 20, 20, 0.95);
            --text-color: #f0f0f0;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        #map { width: 100%; height: 100vh; }

        #btn-toggle-menu {
            position: absolute; top: 15px; right: 15px; z-index: 1001;
            background-color: var(--primary-color); color: white; border: none;
            padding: 10px 15px; border-radius: 8px; font-size: 16px; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: background 0.3s;
        }
        #btn-toggle-menu:hover { background-color: #3d152a; }

        #panel {
            position: absolute; top: 60px; right: 15px; background: var(--bg-panel);
            color: var(--text-color); padding: 20px; border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5); z-index: 1000; width: 280px;
            max-height: calc(100vh - 160px); overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
            transform: translateX(0); opacity: 1;
        }

        #panel.oculto { transform: translateX(120%); opacity: 0; pointer-events: none; }
        #panel h1 { margin-top: 0; font-size: 22px; text-align: center; border-bottom: 2px solid var(--primary-color); padding-bottom: 10px; }
        #panel h2 { font-size: 15px; margin-top: 20px; color: #ccc; text-transform: uppercase; letter-spacing: 1px; }

        .btn-ruta {
            display: flex; align-items: center; width: 100%; margin-bottom: 10px; padding: 12px;
            background: transparent; color: white; border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px; cursor: pointer; font-weight: 600; text-align: left; transition: all 0.2s ease;
        }
        .btn-ruta:hover { background-color: var(--primary-color); border-color: var(--primary-color); transform: translateY(-2px); }
        .color-indicator { width: 12px; height: 12px; border-radius: 50%; margin-right: 12px; border: 2px solid white; flex-shrink: 0; }
        .btn-clear { background-color: #333; color: #aaa; margin-top: 20px; text-align: center; justify-content: center; }
        .btn-clear:hover { background-color: #444; color: white; }

        #layer-selector {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9); padding: 5px; border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4); z-index: 1000; display: flex; gap: 5px;
        }

        .btn-capa {
            background: transparent; border: none; padding: 8px 16px; border-radius: 20px;
            cursor: pointer; font-weight: bold; color: #333; transition: all 0.2s;
        }
        .btn-capa.activo { background: var(--primary-color); color: white; }
    </style>
</head>
<body>

    <button id="btn-toggle-menu" onclick="toggleMenu()">☰ Menú</button>

 <div id="panel" class="oculto">
        <h1>Utrera Sacra 2026</h1>
        
        <h2>Domingo de Ramos</h2>
        <button class="btn-ruta" onclick="cargarYdibujarRuta('trinidad', '#CC0000')">
            <div class="color-indicator" style="background-color: #CC0000;"></div>
            La Trinidad
        </button>
        <button class="btn-ruta" onclick="cargarYdibujarRuta('huerto', '#800080')">
            <div class="color-indicator" style="background-color: #800080;"></div>
            Oración en el Huerto
        </button>
        <button class="btn-ruta" onclick="cargarYdibujarRuta('quinta', '#000000')">
            <div class="color-indicator" style="background-color: #000000;"></div>
            Quinta Angustia
        </button>
        <h2>Lunes Santo</h2>
        <button class="btn-ruta" onclick="cargarYdibujarRuta('muchachos', '#000080')">
            <div class="color-indicator" style="background-color: #000080;"></div>
            Muchachos de Consolación
        </button>
        <button class="btn-ruta btn-clear" onclick="limpiarMapa()">Limpiar Mapa</button>
         <h2>Martes Santo</h2>
        <button class="btn-ruta" onclick="cargarYdibujarRuta('estudiantes', '#A30000')">
            <div class="color-indicator" style="background-color: #A30000;"></div>
            Los Estudiantes
        </button>
         <h2>Miércoles Santo</h2>
        <button class="btn-ruta" onclick="cargarYdibujarRuta('aceituneros', '#006400')">
            <div class="color-indicator" style="background-color: #006400;"></div>
            Los Aceituneros
        </button>
        <h2>Jueves Santo</h2>
        <button class="btn-ruta" onclick="cargarYdibujarRuta('trinidad_jueves', '#8B0000')">
            <div class="color-indicator" style="background-color: #8B0000;"></div>
            Trinidad (Jueves Santo)
        </button>
 </div>

    <div id="layer-selector">
        <button id="btn-normal" class="btn-capa activo" onclick="cambiarCapa('normal')">Callejero</button>
        <button id="btn-satelite" class="btn-capa" onclick="cambiarCapa('satelite')">Satélite</button>
    </div>

    <div id="map"></div>

    <script src="https://cdn.jsdelivr.net/npm/ol@v8.2.0/dist/ol.js"></script>
    <script>
        function toggleMenu() {
            const panel = document.getElementById('panel');
            const btn = document.getElementById('btn-toggle-menu');
            panel.classList.toggle('oculto');
            btn.innerHTML = panel.classList.contains('oculto') ? '☰ Menú' : '✖ Cerrar';
        }

        const capaOSM = new ol.layer.Tile({ source: new ol.source.OSM(), visible: true });
        const capaSatelite = new ol.layer.Tile({
            source: new ol.source.XYZ({
                url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
                maxZoom: 19,
                attributions: 'Tiles &copy; Esri'
            }),
            visible: false 
        });

        const map = new ol.Map({
            target: 'map',
            layers: [ capaOSM, capaSatelite ],
            view: new ol.View({ center: ol.proj.fromLonLat([-5.783, 37.180]), zoom: 15.3 })
        });

        const rutaSource = new ol.source.Vector();
        const rutaLayer = new ol.layer.Vector({ source: rutaSource, zIndex: 2 });
        map.addLayer(rutaLayer);

       
        // --- DICCIONARIO DE HITOS (Horarios y Puntos Clave) ---
        const hitosRutas = {
            'trinidad': [
                { texto: 'Salida: 11:00 h\nRecogida: 14:15 h', coord: [-5.7843273, 37.1774404] },
                { texto: 'Ayuntamiento: 12:30 h', coord: [-5.7815418, 37.1832707] },
                { texto: 'C. Oficial: 12:50 h', coord: [-5.7817818, 37.1815697] }
            ],
            'huerto': [
                { texto: 'Salida: 17:30 h\nRecogida: 22:00 h', coord: [-5.7781743, 37.1815953] },
                { texto: 'P. Santa María: 18:25 h', coord: [-5.7809228, 37.1795512] },
                { texto: 'P. Santiago: 18:50 h', coord: [-5.7827085, 37.1808442] },
                { texto: 'C. Oficial: 19:10 h', coord: [-5.7815954, 37.1815654] },
                { texto: 'Ayuntamiento: 20:40 h', coord: [-5.7815605, 37.1833113] }
            ],
            // ¡NUEVOS HITOS DE LA QUINTA ANGUSTIA!
            'quinta': [
                { texto: 'Salida: 17:30 h\nRecogida: 23:30 h', coord: [-5.7808899, 37.1793642] },  // Parroquia Santa María [cite: 14]
                { texto: 'Convento H. de la Cruz: 18:10 h', coord: [-5.7815518, 37.1779432] }, // Convento Hermanas Cruz [cite: 16]
                { texto: 'M. Santa Ángela: 18:50 h', coord: [-5.7821855, 37.1795032] },     // Monumento Santa Ángela [cite: 15]
                { texto: 'Parroquia Santiago: 19:30 h', coord: [-5.7830546, 37.1807874] },  // Parroquia de Santiago [cite: 25]
                { texto: 'C. Oficial: 20:00 h', coord: [-5.7818582, 37.1815766] },          // Carrera Oficial [cite: 18, 19]
                { texto: 'Ayuntamiento: 21:30 h', coord: [-5.7815417, 37.183269] }          // Ayuntamiento [cite: 21]
            ],
            // ... (hitos de trinidad, huerto y quinta) ...
            'quinta': [
                { texto: 'Salida: 17:30 h\nRecogida: 23:30 h', coord: [-5.7808899, 37.1793642] },
                { texto: 'Convento H. de la Cruz: 18:10 h', coord: [-5.7815518, 37.1779432] },
                { texto: 'M. Santa Ángela: 18:50 h', coord: [-5.7821855, 37.1795032] },
                { texto: 'Parroquia Santiago: 19:30 h', coord: [-5.7830546, 37.1807874] },
                { texto: 'C. Oficial: 20:00 h', coord: [-5.7818582, 37.1815766] },
                { texto: 'Ayuntamiento: 21:30 h', coord: [-5.7815417, 37.183269] }
            ],
            // ¡NUEVOS HITOS DEL LUNES SANTO!
            'muchachos': [
                { texto: 'Salida: 18:00 h\nRecogida: 00:45 h', coord: [-5.7674099, 37.1920214] },  // Santuario
                { texto: 'C. Oficial: 21:30 h', coord: [-5.7816417, 37.1815659] }              // Carrera Oficial
            ],
            // ¡NUEVOS HITOS DEL MARTES SANTO!
            'estudiantes': [
                { texto: 'Salida: 19:00 h\nRecogida: 00:00 h', coord: [-5.7782574, 37.1821568] },  // Basílica María Auxiliadora
                { texto: 'Ayuntamiento: 20:00 h', coord: [-5.7815498, 37.1833006] },              // Ayuntamiento
                { texto: 'C. Oficial: 23:00 h', coord: [-5.7815706, 37.1815638] }                 // Carrera Oficial
            ],
            // ¡NUEVOS HITOS DEL MIÉRCOLES SANTO!
            'aceituneros': [
                { texto: 'Salida: 19:00 h\nRecogida: 00:00 h', coord: [-5.7809957, 37.1793019] },
                { texto: 'P. Santiago: 20:30 h', coord: [-5.7831323, 37.1807768] },
                { texto: 'C. Oficial: 20:45 h', coord: [-5.7814211, 37.1815675] },
                { texto: 'Ayuntamiento: 22:15 h', coord: [-5.7815485, 37.1833124] }
            ],
            // ¡NUEVOS HITOS DEL JUEVES SANTO!
            'trinidad_jueves': [
                { texto: 'Salida: 19:00 h\nRecogida: 00:15 h', coord: [-5.7833214, 37.1767496] },  // Capilla de la Trinidad
                { texto: 'P. Santiago', coord: [-5.7828372, 37.1808175] },                       // Parroquia de Santiago
                { texto: 'Ayuntamiento: 22:00 h', coord: [-5.7815284, 37.1832621] },             // Ayuntamiento
                { texto: 'C. Oficial: 22:25 h', coord: [-5.7814747, 37.1815718] }                // Carrera Oficial
            ]
        
        };

        function cambiarCapa(tipo) {
            document.getElementById('btn-normal').classList.remove('activo');
            document.getElementById('btn-satelite').classList.remove('activo');
            if (tipo === 'normal') {
                capaOSM.setVisible(true); capaSatelite.setVisible(false);
                document.getElementById('btn-normal').classList.add('activo');
            } else {
                capaOSM.setVisible(false); capaSatelite.setVisible(true);
                document.getElementById('btn-satelite').classList.add('activo');
            }
        }

        async function cargarYdibujarRuta(archivoJson, color) {
            rutaSource.clear();

            try {
                const respuesta = await fetch(`data/${archivoJson}.json`);
                if (!respuesta.ok) throw new Error("Archivo no encontrado");
                
                const coordenadasCrudas = await respuesta.json();
                const coordenadas = coordenadasCrudas.map(coord => ol.proj.fromLonLat(coord));
                const linea = new ol.geom.LineString(coordenadas);
                const featureLinea = new ol.Feature({ geometry: linea });

                const estilos = [
                    new ol.style.Style({ stroke: new ol.style.Stroke({ color: color, width: 5 }) })
                ];

                linea.forEachSegment(function(start, end) {
                    const dx = end[0] - start[0];
                    const dy = end[1] - start[1];
                    const longitud = Math.sqrt(dx * dx + dy * dy);
                    
                    if (longitud > 30) { 
                        const rotacion = -Math.atan2(dy, dx);
                        const puntoMedio = [start[0] + dx / 2, start[1] + dy / 2];
                        estilos.push(new ol.style.Style({
                            geometry: new ol.geom.Point(puntoMedio),
                            image: new ol.style.Icon({
                                src: 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="white" stroke="' + color + '" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>'),
                                anchor: [0.5, 0.5], rotateWithView: true, rotation: rotacion
                            })
                        }));
                    }
                });

                featureLinea.setStyle(estilos);
                rutaSource.addFeature(featureLinea);

                // Dibujar HITOS
                if (hitosRutas[archivoJson]) {
                    hitosRutas[archivoJson].forEach(hito => {
                        const featureHito = new ol.Feature({ geometry: new ol.geom.Point(ol.proj.fromLonLat(hito.coord)) });
                        featureHito.setStyle(new ol.style.Style({
                            image: new ol.style.Circle({ radius: 5, fill: new ol.style.Fill({ color: '#ffffff' }), stroke: new ol.style.Stroke({ color: color, width: 2 }) }),
                            text: new ol.style.Text({
                                text: hito.texto, offsetY: -20, fill: new ol.style.Fill({ color: '#ffffff' }),
                                backgroundFill: new ol.style.Fill({ color: color }), padding: [4, 8, 4, 8], font: 'bold 12px Segoe UI, sans-serif'
                            })
                        }));
                        rutaSource.addFeature(featureHito);
                    });
                }

                map.getView().fit(linea, { padding: [60, 60, 60, 60], duration: 1000 });
                if (!document.getElementById('panel').classList.contains('oculto')) toggleMenu();

            } catch (error) {
                console.error("Error al cargar la ruta:", error);
                alert(`No se pudo cargar la ruta de ${archivoJson}.`);
            }
        }

        function limpiarMapa() { rutaSource.clear(); }
    </script>
</body>
</html>
