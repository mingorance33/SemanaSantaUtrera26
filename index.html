<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utrera Sacra: Itinerarios 2026</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v8.2.0/ol.css">
    <style>
        :root {
            --primary-color: #5c2040;
            --bg-panel: rgba(20, 20, 20, 0.95);
            --text-color: #f0f0f0;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        #map { width: 100%; height: 100vh; }

        /* Botón Flotante para el Menú */
        #btn-toggle-menu {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 1001;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background 0.3s;
        }
        #btn-toggle-menu:hover { background-color: #3d152a; }

        /* Panel Lateral Animado */
        #panel {
            position: absolute;
            top: 60px;
            right: 15px;
            background: var(--bg-panel);
            color: var(--text-color);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            z-index: 1000;
            width: 280px;
            max-height: calc(100vh - 100px);
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
            transform: translateX(0); /* Abierto por defecto */
            opacity: 1;
        }

        #panel.oculto {
            transform: translateX(120%); /* Se esconde a la derecha */
            opacity: 0;
            pointer-events: none;
        }

        #panel h1 { margin-top: 0; font-size: 22px; text-align: center; border-bottom: 2px solid var(--primary-color); padding-bottom: 10px; }
        #panel h2 { font-size: 15px; margin-top: 20px; color: #ccc; text-transform: uppercase; letter-spacing: 1px; }

        .btn-ruta {
            display: flex; align-items: center; width: 100%; margin-bottom: 10px; padding: 12px;
            background: transparent; color: white; border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px; cursor: pointer; font-weight: 600; text-align: left; transition: all 0.2s ease;
        }
        .btn-ruta:hover { background-color: var(--primary-color); border-color: var(--primary-color); transform: translateY(-2px); }
        .color-indicator { width: 12px; height: 12px; border-radius: 50%; margin-right: 12px; border: 2px solid white; flex-shrink: 0; }
        .btn-clear { background-color: #333; color: #aaa; margin-top: 20px; text-align: center; justify-content: center; }
        .btn-clear:hover { background-color: #444; color: white; }
    </style>
</head>
<body>

    <button id="btn-toggle-menu" onclick="toggleMenu()">☰ Menú de Rutas</button>

    <div id="panel">
        <h1>Utrera Sacra 2026</h1>
        
        <h2>Domingo de Ramos</h2>
        <button class="btn-ruta" onclick="cargarYdibujarRuta('trinidad', '#CC0000')">
            <div class="color-indicator" style="background-color: #CC0000;"></div>
            La Trinidad (Borriquita)
        </button>

        <button class="btn-ruta btn-clear" onclick="limpiarMapa()">Limpiar Mapa</button>
    </div>

    <div id="map"></div>

    <script src="https://cdn.jsdelivr.net/npm/ol@v8.2.0/dist/ol.js"></script>
    <script>
        // --- Interfaz: Ocultar/Mostrar Menú ---
        function toggleMenu() {
            const panel = document.getElementById('panel');
            panel.classList.toggle('oculto');
        }

        // --- Configuración Inicial del Mapa ---
        const templos = [
            { nombre: "Capilla Trinidad", coord: [-5.7843273, 37.1774404] },
            { nombre: "Santuario Consolación", coord: [-5.76600, 37.19000] }
        ];

        const map = new ol.Map({
            target: 'map',
            layers: [ new ol.layer.Tile({ source: new ol.source.OSM() }) ],
            view: new ol.View({ center: ol.proj.fromLonLat([-5.783, 37.180]), zoom: 15.3 })
        });

        const rutaSource = new ol.source.Vector();
        const rutaLayer = new ol.layer.Vector({ source: rutaSource });
        map.addLayer(rutaLayer);

        const temploSource = new ol.source.Vector();
        const temploLayer = new ol.layer.Vector({ source: temploSource });
        map.addLayer(temploLayer);

        // Marcadores de Templos
        templos.forEach(templo => {
            const feature = new ol.Feature({ geometry: new ol.geom.Point(ol.proj.fromLonLat(templo.coord)) });
            feature.setStyle(new ol.style.Style({
                image: new ol.style.Circle({ radius: 7, fill: new ol.style.Fill({ color: '#5c2040' }), stroke: new ol.style.Stroke({ color: 'white', width: 2 }) }),
                text: new ol.style.Text({ text: templo.nombre, offsetY: -18, fill: new ol.style.Fill({ color: '#000' }), backgroundFill: new ol.style.Fill({ color: 'rgba(255,255,255,0.8)' }), padding: [2, 5, 2, 5], font: 'bold 12px Segoe UI' })
            }));
            temploSource.addFeature(feature);
        });

        // --- Lógica: Cargar JSON Remoto y Dibujar ---
        async function cargarYdibujarRuta(archivoJson, color) {
            rutaSource.clear(); // Limpiamos la ruta anterior

            try {
                // Hacemos FETCH a la carpeta /data/
                const respuesta = await fetch(`data/${archivoJson}.json`);
                if (!respuesta.ok) throw new Error("Archivo no encontrado");
                
                const coordenadasCrudas = await respuesta.json();
                
                // Convertimos coordenadas a formato OpenLayers
                const coordenadas = coordenadasCrudas.map(coord => ol.proj.fromLonLat(coord));
                const linea = new ol.geom.LineString(coordenadas);
                const feature = new ol.Feature({ geometry: linea });

                // DIBUJAR LÍNEA + FLECHAS
                const estilos = [
                    new ol.style.Style({
                        stroke: new ol.style.Stroke({ color: color, width: 5 })
                    })
                ];

                // Generamos flechas a lo largo de los segmentos de la línea
                linea.forEachSegment(function(start, end) {
                    const dx = end[0] - start[0];
                    const dy = end[1] - start[1];
                    const longitud = Math.sqrt(dx * dx + dy * dy);
                    
                    // Solo dibujamos flecha si el tramo es suficientemente largo (evita amontonamiento)
                    if (longitud > 30) { 
                        const rotacion = -Math.atan2(dy, dx); // Ángulo para alinear la flecha
                        const puntoMedio = [start[0] + dx / 2, start[1] + dy / 2];

                        estilos.push(new ol.style.Style({
                            geometry: new ol.geom.Point(puntoMedio),
                            // Usamos un icono de flecha SVG directamente
                            image: new ol.style.Icon({
                                src: 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="white" stroke="' + color + '" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>'),
                                anchor: [0.5, 0.5],
                                rotateWithView: true,
                                rotation: rotacion
                            })
                        }));
                    }
                });

                feature.setStyle(estilos);
                rutaSource.addFeature(feature);

                // Centrar y hacer zoom en la ruta cargada
                map.getView().fit(linea, { padding: [50, 50, 50, 50], duration: 1000 });

                // (Opcional) Ocultar menú en móviles al seleccionar ruta
                if(window.innerWidth < 600) toggleMenu();

            } catch (error) {
                console.error("Error al cargar la ruta:", error);
                alert(`No se pudo cargar la ruta de ${archivoJson}. ¿Aseguraste de crear el archivo en la carpeta data/?`);
            }
        }

        function limpiarMapa() {
            rutaSource.clear();
        }
    </script>
</body>
</html>
